<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Banners by adspot code</title>
  </head>

  <body>
    <a href="/index.html">BACK</a>
    <div style="margin-bottom: 100px">Banner by adspot code</div>

    <h1>300x250 Banner by adspot code</h1>
    <div id="adspot-code"></div>
    <script>
      var rdntag = rdntag || {};
      rdntag.cmd = rdntag.cmd || [];
      rdntag.cmd.push(function () {
        rdntag.defineAdCode('12345', 'adspot-code').setImpId('adspot-code');
        rdntag.display('adspot-code');
      });
    </script>

    <script src="aa.js" async></script>
  </body>
</html>
